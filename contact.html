    <!-- Main Content -->
<main class="main">
  <div class="contact-container">

    <!-- Left Column -->
    <div class="left-column">
      <form id="contact-form" action="https://formspree.io/f/xrbqvbop" method="post" novalidate>
        <h2 class="contact-heading">Contact Me</h2>
        <label>
          <p>Name:</p>
          <input type="text" name="name" required placeholder="Enter name and Surname">
        </label>
        <label>
          <p>Cell:</p>
          <input type="tel" name="phone" pattern="\d{10}" maxlength="10" required placeholder="Enter phone number">
        </label>
        <label>
          <p>Email:</p>
          <input type="email" name="email" required placeholder="Enter email address">
        </label>
        <label>
          <p>Message:</p>
          <textarea name="message" rows="5" required placeholder="Enter message here"></textarea>
        </label>
        <button type="submit">Submit</button>
        <p id="status-message"></p>
      </form>
    </div>

  <!-- Right Column -->
  <div class="right-column">
  <!-- Contact Info Card -->
  <div class="contact-card contact-info">
    <h2>Get in Touch</h2>
    <p><strong>Email:</strong> mlabamfundo3@gmail.com</p>
    <p><strong>Phone:</strong> 012 345 6789</p>
    <p><strong>Location:</strong> Durban University of Technology, Ritson Campus</p>
    <p><strong>Hours:</strong> Mon–Fri, 9AM–5PM</p>
  </div>

  <!-- Map Card -->

      width="100%" 
      height="100%" 
      style="border:0;" 
      allowfullscreen="" 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
      </div>
    </div>
  </div>
